name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - run: dotnet restore AteraSnipeSync.sln --locked-mode
      - run: dotnet build AteraSnipeSync.sln -c Release --no-restore
      - run: dotnet test tests/AteraSnipeSync.Tests/AteraSnipeSync.Tests.csproj -c Release --no-build --collect:"XPlat Code Coverage"
      - run: dotnet format AteraSnipeSync.sln --verify-no-changes --no-restore
